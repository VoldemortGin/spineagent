{{- if include "spineagent.hasSecrets" . }}
# 机密（API key）——仅当 values 里填了任一 key 才渲染。作为 env 注入容器，由对应厂商 SDK 自行读取。
# 这些是 *_API_KEY（非 SPINEAGENT_* 旋钮，spineagent 没有那种旋钮）；仅当入口显式选用真实 provider 时生效。
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spineagent.secretName" . }}
  labels:
    {{- include "spineagent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
{{- end }}
