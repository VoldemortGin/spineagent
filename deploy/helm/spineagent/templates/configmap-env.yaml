{{- if include "spineagent.hasConfigEnv" . }}
# 非机密环境变量 ConfigMap —— 仅当 values.extraEnv 非空时才渲染。
#
# 【诚实说明】spineagent 自身【不读任何 SPINEAGENT_* 旋钮】(其 src/ 对 os.environ 零引用),
# 故这里【不】预置像 ragspine 那样的一整套应用旋钮(预置即伪旋钮)。本 ConfigMap 只承载用户经
# values.extraEnv 显式追加的逃生舱键(供自定义入口读取)。各工作负载经 envFrom 共享。
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spineagent.envConfigMapName" . }}
  labels:
    {{- include "spineagent.labels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
